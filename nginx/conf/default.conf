server {
    listen 80;
    server_name api.kbchachacha.zbek.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.kbchachacha.zbek.me;

    ssl_certificate /etc/letsencrypt/live/api.kbchachacha.zbek.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kbchachacha.zbek.me/privkey.pem;

    location / {
        proxy_pass http://backend:8080; # Проксируем на наш Python контейнер
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Настройки для вебхуков
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}